name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Build JAR with Maven
      run: |
        cd springboot/app
        chmod +x mvnw
        ./mvnw clean package -DskipTests

    - name: Build Backend Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app ./springboot/app

    - name: Push Backend Image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app

    - name: Build Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app ./angular-app

    - name: Push Frontend Image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app

    - name: Test application with Docker Compose
      run: |
        docker compose up -d
