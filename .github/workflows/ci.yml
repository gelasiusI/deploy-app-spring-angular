name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # STEP A: Create the JAR file (The missing piece)
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    
    - name: Build JAR with Maven
      run: |
        chmod +x mvnw
        ./mvnw clean package -DskipTests
      working-directory: ./springboot/app

    # STEP B: Build and Push Docker Image
    - name: Build and Push Backend
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app ./springboot/app
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app

